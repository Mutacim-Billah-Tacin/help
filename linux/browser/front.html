<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startpage</title>
    <style>
        :root {
            --bg: #1e1e2e;
            --fg: #cdd6f4;
            --accent: #cba6f7;
            --peach: #fab387;
            --card-bg: #181825;
            --box-bg: #313244;
            --border: #45475a;
            --subtext: #a6adc8;
            --overlay: #585b70;
            --ash: #313244; 
        }

        /* FULL CENTERING FIX */
        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-it big/glowy clocems: center;
            justify-content: center; /* This pulls everything to the dead center */
            height: 100vh; /* Uses full screen height */
            margin: 0;
            overflow: hidden;
        }

        .header { text-align: center; margin-bottom: 25px; }

        /* BIGGER & GLOWIER CLOCK */
        #clock { 
            font-size: 9rem; 
            font-weight: 800; 
            color: var(--accent); 
            margin: 0; 
            line-height: 1;
            text-shadow: 0 0 20px rgba(203, 166, 247, 0.4), 0 0 40px rgba(203, 166, 247, 0.2);
        }

        #timezone-name { font-size: 0.9rem; color: var(--subtext); text-transform: uppercase; letter-spacing: 5px; margin-top: 10px; font-weight: 600; }

        .search-container {
            width: 100%;
            max-width: 650px;
            margin-bottom: 40px;
            position: relative;
        }

        .search-bar {
            width: 100%;
            padding: 18px;
            font-size: 1.1rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            background-color: var(--ash); /* Your ash color */
            color: var(--subtext);
            text-align: center;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .search-bar:focus {
            background-color: var(--card-bg);
            color: var(--fg);
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(203, 166, 247, 0.2);
        }

        .search-bar:focus::placeholder { color: transparent; }

        .suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--accent);
            border-top: none;
            border-radius: 0 0 12px 12px;
            list-style: none;
            padding: 5px 0;
            margin: 0;
            display: none;
            z-index: 1000;
            box-sizing: border-box;
        }

        .suggestions li { padding: 12px 25px; cursor: pointer; color: var(--subtext); text-align: left; }
        .suggestions li:hover { background: var(--overlay); color: var(--accent); }

        /* AUTO-EXPAND GRID */
        .container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            width: 95%;
            max-width: 1200px;
            align-items: start; /* Lets them grow independently */
        }

        .section {
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .section-header {
            background-color: var(--accent);
            color: var(--bg);
            padding: 12px;
            text-align: center;
            font-weight: 800;
            text-transform: uppercase;
        }

        /* AUTO-LIMIT & SCROLLBAR */
        .shortcut-list {
            padding: 15px;
            overflow-y: auto;
            max-height: 380px; /* Adjust this to change when scrolling starts */
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .shortcut-list::-webkit-scrollbar { width: 4px; }
        .shortcut-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .box { background-color: var(--box-bg); border-radius: 8px; transition: 0.3s; }
        .box a { color: var(--fg); text-decoration: none; display: block; padding: 12px; text-align: center; }
        .box:hover { background-color: var(--peach); transform: scale(1.02); }
        .box:hover a { color: var(--bg); font-weight: 700; }
    </style>
</head>
<body onload="init()">

    <div class="header">
        <div id="clock">--:-- --</div>
        <div id="timezone-name">Local Time</div>
    </div>

    <div class="search-container">
        <form action="https://www.google.com/search" method="get" id="search-form">
            <input type="text" name="q" id="search-input" class="search-bar" 
                   placeholder="Search Google..." autofocus autocomplete="off">
            <ul id="suggestions-box" class="suggestions"></ul>
        </form>
    </div>

    <div class="container">
        <div class="section">
            <div class="section-header">Daily</div>
            <div class="shortcut-list">
                <div class="box"><a href="https://gmail.com">Gmail</a></div>1
                <div class="box"><a href="https://keybr.com">Keybr</a></div>
                <div class="box"><a href="https://youtube.com">YouTube</a></div>
            </div>
        </div>

        <div class="section">
            <div class="section-header">Social</div>
            <div class="shortcut-list">
                <div class="box"><a href="https://discord.com">Discord</a></div>
                <div class="box"><a href="https://messenger.com">Messenger</a></div>
                <div class="box"><a href="https://reddit.com">Reddit</a></div>
                <div><a href="https://web.whatsapp.com/">WhatsApp</a></div>
                <div class="box"><a href="https://x.com">X</a></div>
            </div>
        </div>

        <div class="section">
            <div class="section-header">Tools</div>
            <div class="shortcut-list">
                <div class="box"><a href="https://chatgpt.com">ChatGPT</a></div>
                <div class="box"><a href="https://www.figma.com">Figma</a></div>
                <div class="box"><a href="https://gemini.google.com">Gemini</a></div>
                <div class="box"><a href="https://github.com">GitHub</a></div>
                <div class="box"><a href="http://192.168.0.1">Router</a></div>
            </div>
        </div>

        <div class="section">
            <div class="section-header">Trash</div>
            <div class="shortcut-list">
                <div class="box"><a href="https://open.spotify.com">Spotify</a></div>
                <div class="box"><a href="https://comick.dev">Comick</a></div>
                <div class="box"><a href="https://comix.to">Comix</a></div>
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('search-input');
        const box = document.getElementById('suggestions-box');
        const form = document.getElementById('search-form');

        function init() {
            updateClock();
            setInterval(updateClock, 1000);
            displayLocationName();
            input.addEventListener('focus', () => { input.value = ''; box.style.display = 'none'; });
        }

        function updateClock() {
            const now = new Date();
            let hours = now.getHours() % 12 || 12;
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const ampm = now.getHours() >= 12 ? 'PM' : 'AM';
            document.getElementById('clock').textContent = `${hours}:${minutes} ${ampm}`;
        }

        function displayLocationName() {
            try {
                const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
                const city = tz.split('/').pop().replace('_', ' '); 
                document.getElementById('timezone-name').textContent = city;
            } catch (e) {
                document.getElementById('timezone-name').textContent = "Dhaka";
            }
        }

        window.handleSuggestions = function(data) {
            const results = data[1];
            box.innerHTML = '';
            if (results && results.length > 0) {
                box.style.display = 'block';
                input.style.borderRadius = "12px 12px 0 0";
                results.slice(0, 8).forEach(item => {
                    const li = document.createElement('li');
                    li.textContent = item;
                    li.onclick = () => { input.value = item; form.submit(); };
                    box.appendChild(li);
                });
            } else { 
                box.style.display = 'none';
                input.style.borderRadius = "12px";
            }
        };

        input.addEventListener('input', () => {
            const query = input.value.trim();
            if (query.length > 0) {
                const script = document.createElement('script');
                script.src = `https://suggestqueries.google.com/complete/search?client=firefox&q=${encodeURIComponent(query)}&callback=handleSuggestions`;
                document.head.appendChild(script);
            } else { box.style.display = 'none'; input.style.borderRadius = "12px"; }
        });

        document.addEventListener('click', (e) => {
            if (!input.contains(e.target)) {
                box.style.display = 'none';
                input.style.borderRadius = "12px";
            }
        });
    </script>
</body>
</html>
